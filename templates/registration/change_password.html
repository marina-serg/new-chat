{% extends "chat/base.html" %}
{% load static %}
{% block content %}
<div class="change-content">
    <h3>Change Your Password</h3>
    {% if form.errors %}
        <div class="container d-flex align-items-center justify-content-center">
            <div class="alert alert-warning alert-dismissible fade show w-50  d-block" role="alert">
                {% for key, value in form.errors.items %}
                    <strong>{{ value }}</strong>
                {% endfor %}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        </div>
    {% endif %}
    <div class="form-content"></div>
    <form method="POST" class="form-control">
        {% csrf_token %}
        <div class="form-group">
        <label class="change-content-label">Old Password</label>
        <input type="password" class="form-control form-label" name="old_password" autocomplete="new-password" required
               id="id_old_password"
               placeholder="Enter Old Password"/>
        </div>
        <div class="form-group">
        <label class="change-content-label">New Password</label>
        <input type="password" class="form-control form-label" name="new_password1" autocomplete="new-password"
               required id="id_new_password1"
               placeholder="Enter New Password"/>
        </div>
        <div class="form-group">
        <label for="id_new_password2" class="change-content-label">New Password Confirmation</label>
        <input type="password" class="form-control form-label" name="new_password2" autocomplete="new-password"
               required id="id_new_password2" placeholder="Confirm New Password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" id="reset">Update Password</button>
    </form>
    </div>
    </div>
{% endblock content %}
